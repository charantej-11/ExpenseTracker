<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Split Expense Tracker | Smart Finance Dashboard</title>
    <!-- Chart.js CDN for beautiful graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    </style>
    <link rel="stylesheet" href="sample_styles.css">
</head>
<body>

<div id="app"></div>

<script>
    // ---------- LOCAL STORAGE KEYS ----------
    const USERS_KEY = "expense_users";
    const SESSION_KEY = "expense_logged_user";
    // each user data: { email, password, salary, expenses: [{ id, description, amount, date }] }

    // Helper: load users from localStorage
    function getUsers() {
        const users = localStorage.getItem(USERS_KEY);
        return users ? JSON.parse(users) : [];
    }

    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function getCurrentUser() {
        const email = localStorage.getItem(SESSION_KEY);
        if (!email) return null;
        const users = getUsers();
        return users.find(u => u.email === email) || null;
    }

    function setCurrentUser(email) {
        if (email) localStorage.setItem(SESSION_KEY, email);
        else localStorage.removeItem(SESSION_KEY);
    }

    function updateUserInDB(updatedUser) {
        let users = getUsers();
        const index = users.findIndex(u => u.email === updatedUser.email);
        if (index !== -1) {
            users[index] = updatedUser;
            saveUsers(users);
            return true;
        }
        return false;
    }

    // Helper: generate new expense id
    function generateExpenseId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // ---------- RENDER ENGINE (SPA style) ----------
    let currentView = "login"; // login, register, dashboard
    let expensePieChartInstance = null;
    let balanceChartInstance = null;

    const appDiv = document.getElementById("app");

    function render() {
        if (currentView === "login") renderLogin();
        else if (currentView === "register") renderRegister();
        else if (currentView === "dashboard") renderDashboard();
    }

    // Helper function to validate login (case-sensitive but trimmed)
    function validateLogin(email, password) {
        const users = getUsers();
        const user = users.find(u => u.email === email);
        if (!user) return false;
        // Direct string comparison
        return user.password === password;
    }

    // ---------- FORGOT PASSWORD MODAL (global helper) ----------
    function showForgotPasswordModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-overlay';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3><i class="fas fa-key"></i> Forgot Password</h3>
                <p style="font-size:0.85rem; color:#666;">Enter your registered email to reset password.</p>
                <input type="email" id="forgotEmail" placeholder="your@email.com" autocomplete="off">
                <div id="forgotMsg" style="font-size:0.75rem; text-align:center;"></div>
                <div class="modal-buttons">
                    <button class="btn-cancel" id="closeForgotModal">Cancel</button>
                    <button class="btn-confirm" id="resetPasswordBtn">Reset Password</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('closeForgotModal').addEventListener('click', () => modalDiv.remove());
        document.getElementById('resetPasswordBtn').addEventListener('click', () => {
            const email = document.getElementById('forgotEmail').value.trim();
            const msgDiv = document.getElementById('forgotMsg');
            if (!email) {
                msgDiv.innerText = 'Please enter email';
                msgDiv.style.color = '#c27d5c';
                return;
            }
            const users = getUsers();
            const userIndex = users.findIndex(u => u.email === email);
            if (userIndex === -1) {
                msgDiv.innerText = 'No account found with this email.';
                msgDiv.style.color = '#c27d5c';
                return;
            }
            // generate a simple random temporary password (8 chars for better security)
            const newPassword = Math.random().toString(36).slice(-8);
            users[userIndex].password = newPassword;
            saveUsers(users);
            msgDiv.innerHTML = `✅ Password reset successfully!<br>New password: <strong>${newPassword}</strong><br>Please login with this password.`;
            msgDiv.style.color = '#2c6e2c';
            // auto close after 5 seconds
            setTimeout(() => {
                modalDiv.remove();
            }, 5000);
        });
    }

    // ----- PROFILE DROPDOWN + MODALS (View Profile, Change Password) -----
    function showProfileModal(type, userEmail) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-overlay';
        if (type === 'view') {
            modalDiv.innerHTML = `
                <div class="modal-card">
                    <h3><i class="fas fa-user-circle"></i> Profile Details</h3>
                    <div style="margin: 1rem 0; padding: 0.8rem; background:#F9F2EA; border-radius:1rem;">
                        <p><strong>📧 Email:</strong> ${escapeHtml(userEmail)}</p>
                        <p><strong>🆔 Registered ID:</strong> ${escapeHtml(userEmail)}</p>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="closeProfileModal">Close</button>
                    </div>
                </div>
            `;
        } else if (type === 'changePassword') {
            modalDiv.innerHTML = `
                <div class="modal-card">
                    <h3><i class="fas fa-lock"></i> Change Password</h3>
                    <div style="margin: 0.5rem 0;">
                        <input type="password" id="currentPwd" placeholder="Current Password" autocomplete="off">
                        <input type="password" id="newPwd" placeholder="New Password" autocomplete="off">
                        <input type="password" id="confirmNewPwd" placeholder="Confirm New Password" autocomplete="off">
                        <div id="pwdChangeMsg" style="font-size:0.75rem; margin-top:6px;"></div>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="closePwdModal">Cancel</button>
                        <button class="btn-confirm" id="updatePwdBtn">Update Password</button>
                    </div>
                </div>
            `;
        }
        document.body.appendChild(modalDiv);
        if (type === 'view') {
            document.getElementById('closeProfileModal').addEventListener('click', () => modalDiv.remove());
        } else if (type === 'changePassword') {
            document.getElementById('closePwdModal').addEventListener('click', () => modalDiv.remove());
            document.getElementById('updatePwdBtn').addEventListener('click', () => {
                const currentPwd = document.getElementById('currentPwd').value;
                const newPwd = document.getElementById('newPwd').value;
                const confirmPwd = document.getElementById('confirmNewPwd').value;
                const msgDiv = document.getElementById('pwdChangeMsg');
                let user = getCurrentUser();
                if (!user) {
                    msgDiv.innerText = 'Session expired, please login again.';
                    msgDiv.style.color = '#c27d5c';
                    return;
                }
                if (user.password !== currentPwd) {
                    msgDiv.innerText = 'Current password is incorrect.';
                    msgDiv.style.color = '#c27d5c';
                    return;
                }
                if (!newPwd || newPwd.length < 4) {
                    msgDiv.innerText = 'New password must be at least 4 characters.';
                    msgDiv.style.color = '#c27d5c';
                    return;
                }
                if (newPwd !== confirmPwd) {
                    msgDiv.innerText = 'New passwords do not match.';
                    msgDiv.style.color = '#c27d5c';
                    return;
                }
                // update password in storage
                user.password = newPwd;
                updateUserInDB(user);
                msgDiv.innerHTML = '✅ Password changed successfully!';
                msgDiv.style.color = '#2c6e2c';
                setTimeout(() => {
                    modalDiv.remove();
                }, 1500);
            });
        }
    }

    // LOGIN PAGE (with forgot password link and debug option)
    function renderLogin() {
        appDiv.innerHTML = `
                <div class="form-card">
                    <h2><i class="fas fa-coins"></i> Split Expense Tracker</h2>
                    <p style="text-align:center; margin-bottom:1.5rem; color:#8B7A6B;">Login to your account</p>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                    <div id="loginError" class="error-msg" style="text-align:center;"></div>
                    <button id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                    <div class="forgot-link"><span id="forgotPwdLink"><i class="fas fa-question-circle"></i> Forgot password?</span></div>
                    <div class="toggle-text">Don't have an account? <span id="gotoRegister">Register now</span></div>
                    </div>
        `;
        
        document.getElementById("doLoginBtn").addEventListener("click", () => {
            const email = document.getElementById("loginEmail").value.trim();
            const pwd = document.getElementById("loginPassword").value;
            
            if (!email || !pwd) {
                document.getElementById("loginError").innerText = "Please enter both email and password";
                return;
            }
            
            const users = getUsers();
            const user = users.find(u => u.email === email);
            
            if (user && user.password === pwd) {
                setCurrentUser(email);
                currentView = "dashboard";
                render();
            } else {
                if (user) {
                    document.getElementById("loginError").innerHTML = `Invalid password. <br><small style="font-size:0.7rem;">(Password stored: "${user.password}" | You entered: "${pwd}")</small>`;
                } else {
                    document.getElementById("loginError").innerText = "Email not found. Please register first.";
                }
            }
        });
        
        document.getElementById("gotoRegister").addEventListener("click", () => {
            currentView = "register";
            render();
        });
        
        document.getElementById("forgotPwdLink").addEventListener("click", () => {
            showForgotPasswordModal();
        });
        
        // Debug feature - show registered accounts (for testing purposes only)
        document.getElementById("debugInfo").addEventListener("click", () => {
            const users = getUsers();
            if (users.length === 0) {
                alert("No registered accounts found.");
            } else {
                let message = "Registered accounts:\n";
                users.forEach((user, index) => {
                    message += `${index + 1}. Email: ${user.email}, Password: ${user.password}\n`;
                });
                alert(message + "\n\n(Remove this debug feature in production)");
            }
        });
    }

    // REGISTER PAGE (unchanged but with better validation)
    function renderRegister() {
        appDiv.innerHTML = `
            <div class="auth-container">
                <div class="form-card">
                    <h2><i class="fas fa-wallet"></i> Start tracking expenses</h2>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="your@email.com">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="create password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirm" placeholder="confirm password">
                    </div>
                    <div id="regError" class="error-msg" style="text-align:center;"></div>
                    <button id="doRegisterBtn"><i class="fas fa-check-circle"></i> Register</button>
                    <div class="toggle-text">Already have an account? <span id="gotoLogin">Sign in</span></div>
                </div>
            </div>
        `;
        
        document.getElementById("doRegisterBtn").addEventListener("click", () => {
            const email = document.getElementById("regEmail").value.trim();
            const password = document.getElementById("regPassword").value;
            const confirm = document.getElementById("regConfirm").value;
            
            if (!email || !password) {
                document.getElementById("regError").innerText = "Email and password required";
                return;
            }
            if (password !== confirm) {
                document.getElementById("regError").innerText = "Passwords do not match";
                return;
            }
            if (password.length < 4) {
                document.getElementById("regError").innerText = "Password must be at least 4 characters";
                return;
            }
            
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                document.getElementById("regError").innerText = "Email already registered";
                return;
            }
            
            const newUser = {
                email: email,
                password: password,
                salary: 0,
                expenses: []
            };
            users.push(newUser);
            saveUsers(users);
            setCurrentUser(email);
            currentView = "dashboard";
            render();
        });
        
        document.getElementById("gotoLogin").addEventListener("click", () => {
            currentView = "login";
            render();
        });
    }

    // DASHBOARD : with profile icon dropdown (view profile, change password)
    function renderDashboard() {
        let user = getCurrentUser();
        if (!user) {
            currentView = "login";
            render();
            return;
        }
        
        const email = user.email;
        const name = email.split('@')[0];

        if (!user.expenses) user.expenses = [];
        if (typeof user.salary !== 'number') user.salary = 0;

        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        
        const monthlyExpenses = user.expenses.filter(exp => {
            const expDate = new Date(exp.date);
            return expDate.getMonth() === currentMonth && expDate.getFullYear() === currentYear;
        });

        const totalMonthlySpent = monthlyExpenses.reduce((sum, e) => sum + e.amount, 0);
        const monthlySalary = user.salary;
        const balanceAmount = monthlySalary - totalMonthlySpent;

        const expenseMap = new Map();
        monthlyExpenses.forEach(exp => {
            const type = exp.description || "Other";
            expenseMap.set(type, (expenseMap.get(type) || 0) + exp.amount);
        });
        const expenseLabels = Array.from(expenseMap.keys());
        const expenseData = Array.from(expenseMap.values());
        
        const pieColors = ['#ae8162', '#C49A7A', '#8B6B4F', '#A8795C', '#BF8F6E', '#D9B48B', '#9B6E4E', '#B58763','#C59B78','#A56E48','#7A5A44','#CDA07A','#E1B88C'];

        const balanceChartLabels = ["Salary", "Spent", "Remaining Balance"];
        const balanceChartValues = [monthlySalary, totalMonthlySpent, balanceAmount < 0 ? 0 : balanceAmount];

        const allTransactionsSorted = [...user.expenses].sort((a,b) => new Date(b.date) - new Date(a.date));
        const recentTransactions = allTransactionsSorted.slice(0, 8);

        appDiv.innerHTML = `
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <h1><i class="fas fa-chart-line"></i> Expense Tracker</h1>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="font-size:0.9rem; color:#4A3B2F; font-weight:600;">
                            👋 Welcome, ${escapeHtml(name)}
                        </div>
                        <!-- Profile Icon with Dropdown -->
                        <div class="profile-dropdown" id="profileDropdownWrapper">
                            <button class="profile-icon-btn" id="profileIconBtn">
                                <i class="fas fa-user-circle"></i>
                            </button>
                            <div class="dropdown-content" id="profileDropdownMenu">
                                <a id="viewProfileOption"><i class="fas fa-id-card"></i> View Profile</a>
                                <a id="changePasswordOption"><i class="fas fa-key"></i> Change Password</a>
                                <a id="logoutOption"><i class="fas fa-sign-out-alt"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>                
                <!-- Overview section -->
                <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; background: #FEF7F0; border-radius: 2rem; padding: 1.3rem 1.8rem; margin-bottom: 1.8rem; border: 1px solid #F0E4D8;">
                    <div style="flex:1; min-width:140px;"><span style="font-size:0.8rem; color:#8B7A6B;">Balance</span><br><strong style="font-size:1.9rem; color:#2C241E;">${formatCurrency(balanceAmount)}</strong></div>
                    <div style="flex:1; min-width:140px;"><span style="font-size:0.8rem; color:#8B7A6B;">INCOME</span><br><strong style="font-size:1.6rem; color:#5A7D5A;">${formatCurrency(monthlySalary)}</strong></div>
                    <div style="flex:1; min-width:140px;"><span style="font-size:0.8rem; color:#8B7A6B;">EXPENSE</span><br><strong style="font-size:1.6rem; color:#C27D5C;">${formatCurrency(totalMonthlySpent)}</strong></div>
                </div>
                
                <!-- Salary entry -->
                <div class="salary-section">
                    <div class="salary-input-group">
                        <label><i class="fas fa-dollar-sign"></i> Monthly Salary (₹)</label>
                        <input type="number" id="salaryAmount" step="0.01" placeholder="e.g., 50000" value="${user.salary}">
                    </div>
                    <button class="salary-btn" id="updateSalaryBtn"><i class="fas fa-save"></i> Set Salary</button>
                    <div class="current-salary"><i class="fas fa-wallet"></i> Current: ${formatCurrency(user.salary)}</div>
                </div>
                
                <!-- Expense Form Row -->
                <div class="expense-form-row">
                    <div class="input-group">
                        <label>Expense Type / Description</label>
                        <input type="text" id="expenseDesc" placeholder="e.g., Groceries, Rent, Shopping">
                    </div>
                    <div class="input-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="expenseAmount" step="0.01" placeholder="0.00">
                    </div>
                    <button class="add-expense-btn" id="addExpenseBtn"><i class="fas fa-plus-circle"></i> Add Expense</button>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap:wrap; margin-top: 0.8rem;">
                    <h3 style="color:#4A3B2F;"><i class="far fa-calendar-alt"></i> This month (${now.toLocaleString('default', { month: 'long' })})</h3>
                    <span style="background:#F0E4D8; padding:0.3rem 1rem; border-radius:1rem; font-weight:bold;">Total: ${formatCurrency(totalMonthlySpent)}</span>
                </div>
                <div class="expense-list" id="expenseListContainer">
                    ${renderExpenseList(monthlyExpenses)}
                </div>
                
                <div class="charts-row">
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-pie"></i> Expense Breakdown (Pie Chart)</h3>
                        <canvas id="expensePieChart" width="400" height="250"></canvas>
                        ${expenseLabels.length === 0 ? '<div class="balance-info">✨ No expenses this month. Add expenses to see breakdown.</div>' : ''}
                    </div>
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-line"></i> Income vs Expense vs Balance</h3>
                        <canvas id="balanceOverviewChart" width="400" height="250"></canvas>
                        <div class="balance-info">
                            📊 Savings Goal: ${formatCurrency(balanceAmount > 0 ? balanceAmount : 0)} left
                        </div>
                    </div>
                </div>
                
                <!-- Recent Transactions Table -->
                <div style="margin-top: 1.5rem; background: white; border-radius: 1.5rem; padding: 0.8rem; border: 1px solid #F0E7DE;">
                    <h3 style="margin-bottom: 0.8rem; color:#4A3B2F;"><i class="fas fa-history"></i> Recent Transactions</h3>
                    <div style="overflow-x: auto;">
                        <table style="width:100%; border-collapse: collapse; text-align: left; font-size:0.85rem;">
                            <thead style="background:#F9F2EA; border-radius:1rem;">
                                <tr><th style="padding: 10px 8px;">Category</th><th style="padding: 10px 8px;">Description</th><th style="padding: 10px 8px;">Amount</th><th style="padding: 10px 8px;">Date</th></tr>
                            </thead>
                            <tbody>
                                ${recentTransactions.map(tx => {
                                    let catIcon = "📌";
                                    const descLow = tx.description.toLowerCase();
                                    if (descLow.includes("salary")) catIcon = "💰";
                                    else if (descLow.includes("food") || descLow.includes("grocery")) catIcon = "🍔";
                                    else if (descLow.includes("rent")) catIcon = "🏠";
                                    else if (descLow.includes("shopping")) catIcon = "🛍️";
                                    else if (descLow.includes("transport") || descLow.includes("fuel") || descLow.includes("car")) catIcon = "🚗";
                                    else if (descLow.includes("entertainment") || descLow.includes("movie")) catIcon = "🎬";
                                    return `<tr style="border-bottom:1px solid #F0E4D8;"><td style="padding: 8px;">${catIcon} ${escapeHtml(tx.description.split(' ')[0] || 'Expense')}</td><td style="padding: 8px;">${escapeHtml(tx.description)}</td><td style="padding: 8px; font-weight:500;">${formatCurrency(tx.amount)}</td><td style="padding: 8px; color:#8B7A6B;">${formatDate(tx.date)}</td></tr>`;
                                }).join('')}
                                ${recentTransactions.length === 0 ? '<tr><td colspan="4" style="padding: 1rem; text-align:center;">No recent transactions. Add an expense!</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                    <div style="text-align:center; margin-top: 1.5rem;">
                        <button id="nextMonthBtn" class="planning-btn">📅 Next Month Planning Schedule</button>
                    </div>   
                </div>
                <div style="margin-top: 1.2rem; font-size:0.75rem; text-align:center; color:#8B7A6B; display: flex; justify-content: center; gap: 1.5rem;">
                    <span><i class="fas fa-shield-alt"></i> Secure</span>
                    <span><i class="fas fa-chart-simple"></i> Track</span>
                    <span><i class="fas fa-bullseye"></i> Achieve</span>
                </div>
            </div>
        `;

        // --- Dropdown logic ---
        const profileBtn = document.getElementById('profileIconBtn');
        const dropdownMenu = document.getElementById('profileDropdownMenu');
        if (profileBtn && dropdownMenu) {
            profileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdownMenu.classList.toggle('show-dropdown');
            });
            // close dropdown if click outside
            window.addEventListener('click', function closeDropdown(e) {
                if (profileBtn && !profileBtn.contains(e.target) && dropdownMenu.classList.contains('show-dropdown')) {
                    dropdownMenu.classList.remove('show-dropdown');
                }
            });
            document.getElementById('viewProfileOption')?.addEventListener('click', () => {
                dropdownMenu.classList.remove('show-dropdown');
                showProfileModal('view', user.email);
            });
            document.getElementById('changePasswordOption')?.addEventListener('click', () => {
                dropdownMenu.classList.remove('show-dropdown');
                showProfileModal('changePassword', user.email);
            });
            document.getElementById('logoutOption')?.addEventListener('click', () => {
                setCurrentUser(null);
                currentView = "login";
                render();
            });
        }

        document.getElementById("updateSalaryBtn").addEventListener("click", () => {
            const newSalary = parseFloat(document.getElementById("salaryAmount").value);
            if (isNaN(newSalary)) return;
            let updatedUser = getCurrentUser();
            if (updatedUser) {
                updatedUser.salary = newSalary;
                updateUserInDB(updatedUser);
                renderDashboard();
            }
        });

        document.getElementById("addExpenseBtn").addEventListener("click", () => {
            const desc = document.getElementById("expenseDesc").value.trim();
            const amount = parseFloat(document.getElementById("expenseAmount").value);
            if (!desc || isNaN(amount) || amount <= 0) {
                alert("Please enter valid description and positive amount");
                return;
            }
            let current = getCurrentUser();
            if (current) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2,'0');
                const dd = String(today.getDate()).padStart(2,'0');
                const newExpense = {
                    id: generateExpenseId(),
                    description: desc,
                    amount: amount,
                    date: `${yyyy}-${mm}-${dd}`
                };
                current.expenses.push(newExpense);
                updateUserInDB(current);
                renderDashboard();
            } else {
                alert("Session expired");
                currentView = "login";
                render();
            }
        });

        const nextBtn = document.getElementById("nextMonthBtn");
        if (nextBtn) {
            nextBtn.addEventListener("click", () => {
                window.location.href = "future_plan.html";
            });
        }
        attachDeleteExpenseEvents();
        setTimeout(() => {
            drawExpensePieChart(expenseLabels, expenseData, pieColors);
            drawBalanceChart(balanceChartLabels, balanceChartValues);
        }, 50);
    }

    function renderExpenseList(expensesArray) {
        if (!expensesArray.length) return `<div style="padding: 1rem; text-align:center; color:#8B7A6B;">No expenses recorded this month. Start adding!</div>`;
        const sorted = [...expensesArray].sort((a,b) => new Date(b.date) - new Date(a.date));
        return sorted.map(exp => `
            <div class="expense-item" data-id="${exp.id}">
                <div><strong>${escapeHtml(exp.description)}</strong>  <span style="font-size:0.75rem; color:#8B7A6B;">${exp.date}</span></div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-weight:bold;">${formatCurrency(exp.amount)}</span>
                    <button class="delete-expense" data-id="${exp.id}"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        `).join('');
    }

    function attachDeleteExpenseEvents() {
        document.querySelectorAll('.delete-expense').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const expenseId = btn.getAttribute('data-id');
                let user = getCurrentUser();
                if (user) {
                    user.expenses = user.expenses.filter(exp => exp.id !== expenseId);
                    updateUserInDB(user);
                    renderDashboard();
                } else {
                    currentView = "login";
                    render();
                }
            });
        });
    }

    function drawExpensePieChart(labels, data, colorPalette) {
        const canvas = document.getElementById("expensePieChart");
        if (!canvas) return;
        if (expensePieChartInstance) expensePieChartInstance.destroy();
        const ctx = canvas.getContext('2d');
        let chartLabels = labels.length ? labels : ["No Data"];
        let chartData = labels.length ? data : [1];
        let backgroundColors = labels.length ? labels.map((_, idx) => colorPalette[idx % colorPalette.length]) : ['#d3d3d3'];
        expensePieChartInstance = new Chart(ctx, {
            type: 'pie', data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: backgroundColors, borderWidth: 2, borderColor: '#ffffff', hoverOffset: 8 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12 } }, tooltip: { callbacks: { label: (ctx) => { const label = ctx.label || ''; const value = ctx.raw || 0; const total = ctx.dataset.data.reduce((a,b)=>a+b,0); const pct = total>0?((value/total)*100).toFixed(1):0; return `${label}: ₹${value.toFixed(2)} (${pct}%)`; } } } } }
        });
    }

    function drawBalanceChart(labels, values) {
        const canvas = document.getElementById("balanceOverviewChart");
        if (!canvas) return;
        if (balanceChartInstance) balanceChartInstance.destroy();
        const ctx = canvas.getContext('2d');
        balanceChartInstance = new Chart(ctx, {
            type: 'bar', data: { labels: labels, datasets: [{ label: 'Amount (₹)', data: values, backgroundColor: ['#ae8162', '#C49A7A', '#8B6B4F'], borderRadius: 12 }] },
            options: { responsive: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `₹ ${ctx.raw.toFixed(2)}` } } }, scales: { y: { beginAtZero: true, ticks: { callback: (val) => '₹' + val } } } }
        });
    }

    function formatCurrency(value) { if (isNaN(value)) value = 0; return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(value); }
    function formatDate(dateString) { if (!dateString) return ''; const parts = dateString.split('-'); if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`; return dateString; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    render();
</script>
</body>
</html>
